<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYIAM supports modNFTs.com — Claim Your @Handle</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background:#0a0a0a; color:#fff; 
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:24px;
  }
  h1 { font-size:2.5rem; font-weight:800; margin-bottom:8px; }
  h1 span { color:#4F46E5; }
  .sub { color:#9ca3af; font-size:1.1rem; margin-bottom:48px; text-align:center; }
  .tiers { display:flex; flex-direction:column; gap:16px; width:100%; max-width:480px; }
  .tier {
    background:#111; border:1px solid #222; border-radius:12px;
    padding:24px; display:flex; justify-content:space-between; align-items:center;
  }
  .tier.featured { border-color:#4F46E5; }
  .tier-name { font-size:1.2rem; font-weight:700; }
  .tier-desc { color:#9ca3af; font-size:0.85rem; margin-top:4px; }
  .tier-price { font-size:1.5rem; font-weight:800; color:#4F46E5; }
  .claim-btn {
    display:block; width:100%; max-width:480px; margin-top:32px;
    background:#4F46E5; color:white; padding:18px;
    border-radius:12px; text-align:center; font-size:1.1rem;
    font-weight:700; text-decoration:none; border:none; cursor:pointer;
  }
  .wallet { 
    margin-top:24px; color:#6b7280; font-size:0.75rem; 
    word-break:break-all; text-align:center; max-width:480px;
  }
  .search {
    width:100%; max-width:480px; padding:16px;
    background:#111; border:1px solid #333; border-radius:12px;
    color:white; font-size:1.1rem; margin-bottom:32px;
    outline:none;
  }
  .search:focus { border-color:#4F46E5; }
</style>
</head>
<body>

<h1>mod<span>nfts</span></h1>
<p class="sub">Claim your @handle. Own your identity across the internet.</p>

<input class="search" type="text" placeholder="Search @yourhandle..." id="handleInput">

<div class="tiers">
  <div class="tier featured">
    <div>
      <div class="tier-name">⚡ Premium Handle</div>
      <div class="tier-desc">1–4 characters. Rare.</div>
    </div>
    <div class="tier-price">8 ETH</div>
  </div>
  <div class="tier">
    <div>
      <div class="tier-name">Standard Handle</div>
      <div class="tier-desc">5–8 characters.</div>
    </div>
    <div class="tier-price">0.8 ETH</div>
  </div>
  <div class="tier">
    <div>
      <div class="tier-name">Basic Handle</div>
      <div class="tier-desc">9+ characters.</div>
    </div>
    <div class="tier-price">0.008 ETH</div>
  </div>
</div>

<a class="claim-btn" id="claimBtn" 
   href="ethereum:0x4a4Af4447e55b0f21f912D821179DC1DC6FE6721">
  Claim This Handle
</a>

<p class="wallet">Payments go directly to:<br>0x4a4Af4447e55b0f21f912D821179DC1DC6FE6721</p>

<script>
  const input = document.getElementById('handleInput');
  const btn = document.getElementById('claimBtn');
  input.addEventListener('input', () => {
    const h = input.value.replace('@','').trim();
    if(h) {
      btn.textContent = `Claim @${h}`;
      btn.href = `ethereum:0x4a4Af4447e55b0f21f912D821179DC1DC6FE6721?value=10000000000000000&data=${encodeURIComponent(h)}`;
    } else {
      btn.textContent = 'Claim This Handle';
      btn.href = 'ethereum:0x4a4Af4447e55b0f21f912D821179DC1DC6FE6721';
    }
  });
</script>

</body>
</html>
